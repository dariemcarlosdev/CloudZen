# ==================================================================================================
# GitHub Actions CI/CD Workflow for the SmartMenuOptim Application
#
# Purpose:
# This workflow automates the build, test, security analysis, and deployment processes for the
# SmartMenuOptim application. It ensures code quality and consistency by running a series of
# automated checks and deployments whenever changes are pushed or pull requests are made to
# key branches.
#
# Publishing Strategy:
# - This pipeline correctly publishes only the entry-point projects: `SmartMenuOptim.API` and `SmartMenuOptim.Server`.
# - Shared libraries (`SmartMenuOptim.Shared`) are automatically included as dependencies during the publish step.
# - Test projects (`SmartMenuOptim.Tests`) are used only for running tests and are not published.
# ==================================================================================================
name: CI/CD Pipeline for SmartMenuOptim

# --------------------------------------------------------------------------------------------------
# Triggers:
# Defines the events that will trigger this workflow to run.
# --------------------------------------------------------------------------------------------------
on:
  push:
    branches:
        - Staging
        - master
        # push Trigger: This is now limited to long-lived branches (master, Staging) This ensures that only merged and approved code is deployed. It's assumed that feature branches (env-dev/*, env-staging/*) will be merged via pull requests.
        # - env-dev/*       
        # - env-staging/*
    paths-ignore:
      - '**/README.md'
      - '**/.gitignore'
      - '**/.gitattributes'

  pull_request:
    branches:
        - Staging
        - master
        # This now targets master and Staging. It will run for any pull request aimed at these branches, which is ideal for validating changes from your env-dev/* and env-staging/* branches  before they are merged into important branches like master or Staging.
        # - env-dev/*
        # - env-staging/*
    paths-ignore:
      - '**/README.md'
      - '**/.gitignore'
      - '**/.gitattributes'

# Improvement: Prevent concurrent workflows on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ==================================================================================================
# Jobs:
# The workflow is composed of several jobs that run in a specific order.
#
# Job Execution Flow:
# 1. `build-and-test`: Compiles the code, runs tests, and packages the application.
# 2. `codeql-analysis`, `security-scan`, `verify-database-migrations`: Run in parallel after `build-and-test` starts.
# 3. `deploy-azure-server` & `deploy-azure-api`: Run after all checks succeed.
# 4. `notify-on-failure` / `notify-on-success`: Run at the end to send a notification.
# ==================================================================================================
jobs:
  # --------------------------------------------------------------------------------------------------
  # Job: build-and-test
  # Purpose: To build, test, and publish the application in a single, efficient job.
  # --------------------------------------------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0 and 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build SmartMenuOptim.sln --configuration Release

    # - name: Run tests with coverage
    #   run: |
    #     dotnet test --no-build \
    #       /p:CollectCoverage=true \
    #       /p:CoverletOutputFormat=cobertura \
    #       /p:CoverletOutput=./TestResults/Coverage/ \
    #       /p:Exclude="[*]*.Migrations.*" \
    #       /p:Threshold=80

    - name: Generate static web assets
      run: |
        dotnet build SmartMenuOptim.API/SmartMenuOptim.API.csproj --configuration Release
        dotnet build SmartMenuOptim.Server/SmartMenuOptim.Server.csproj --configuration Release

    - name: Publish API app
      run: dotnet publish SmartMenuOptim.API/SmartMenuOptim.API.csproj --configuration Release --output ./publish/api

    - name: Publish Server app
      run: dotnet publish SmartMenuOptim.Server/SmartMenuOptim.Server.csproj --configuration Release --output ./publish/server

    - name: Upload deployment artifacts
      uses: actions/upload-artifact@v4
      with:
        name: publish
        path: ./publish

  # --------------------------------------------------------------------------------------------------
  # Job: codeql-analysis (just available in Organization Plan)
  # Purpose: To perform static code analysis using GitHub's CodeQL engine.
  # --------------------------------------------------------------------------------------------------
