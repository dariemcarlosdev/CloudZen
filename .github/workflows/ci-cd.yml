  #   steps:
  #   - name: Checkout code
  #     uses: actions/checkout@v4

  #   - name: Initialize CodeQL
  #     uses: github/codeql-action/init@v3
  #     with:
  #       languages: csharp

  #   - name: Autobuild
  #     uses: github/codeql-action/autobuild@v3

  #   - name: Perform CodeQL Analysis
  #     uses: github/codeql-action/analyze@v3

  # --------------------------------------------------------------------------------------------------
  # Job: security-scan
  # Purpose: Performs security checks on NuGet packages
  # --------------------------------------------------------------------------------------------------
  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
            8.0.x
            9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Security check - vulnerable packages
      run: dotnet list package --vulnerable --include-transitive

  # --------------------------------------------------------------------------------------------------
  # Job: wpsa-security-scan (does not works)
  # Purpose: Runs Microsoft's security analysis tools for web platform security.
  # --------------------------------------------------------------------------------------------------
  # wpsa-security-scan:
  #   name: WPSA Security Analysis
  #   needs: build-and-test
  #   runs-on: ubuntu-latest
  #   permissions:
  #     actions: read
  #     contents: read
  #     security-events: write
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Run Microsoft Security DevOps Analysis
  #       uses: microsoft/security-devops-action@v1
  #       id: msdo

  #     - name: Upload SARIF file
  #       uses: github/codeql-action/upload-sarif@v3
  #       with:
  #         sarif_file: ${{ steps.msdo.outputs.sarifFile }}

  # --------------------------------------------------------------------------------------------------
  # Job: verify-database-migrations
  # Purpose: Applies database migrations and verifies schema
  # --------------------------------------------------------------------------------------------------
  verify-database-migrations:
    needs: security-scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: SmartMenuDb
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install EF Core CLI
      run: dotnet tool install --global dotnet-ef
  
    - name: Add dotnet tools to PATH
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Apply EF Core Migrations
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=SmartMenuDb;Username=postgres;Password=admin123"
      run: dotnet ef database update --project SmartMenuOptim.API/SmartMenuOptim.API.csproj

    - name: Verify Database Schema
      run: |
        sudo apt-get install -y postgresql-client
        PGPASSWORD=admin123 psql -h localhost -U postgres -d SmartMenuDb -c '\dt'

  # --------------------------------------------------------------------------------------------------
  # Job: deploy-azure-server
  # Purpose: To deploy the Blazor Server application to an Azure Web App.
  # --------------------------------------------------------------------------------------------------
  deploy-azure-server:
    needs: [build-and-test, security-scan, verify-database-migrations]
    runs-on: ubuntu-latest
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: publish
        path: ./publish

    - name: Deploy Blazor Server to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_SERVER_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_SERVER_PUBLISH_PROFILE }}
        package: ./publish/server

       
  
  # --------------------------------------------------------------------------------------------------
  # Job: apply-prod-migrations
  # Purpose: To apply EF Core migrations to the production database before deployment.
  # --------------------------------------------------------------------------------------------------
  apply-prod-migrations:
    needs: [build-and-test, security-scan, verify-database-migrations]
    #// Only run on master or Staging branches
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Staging'  
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x' 
       
    - name: Install EF Core CLI
      run: dotnet tool install --global dotnet-ef

    - name: Add dotnet tools to PATH
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Apply EF Core Migrations to Azure PostgreSQL
      env:
        ConnectionStrings__DefaultConnection: ${{ secrets.NEON_POSTGRES_CONNECTION_STRING }}
      run: dotnet ef database update --project SmartMenuOptim.API/SmartMenuOptim.API.csproj

  
  # --------------------------------------------------------------------------------------------------
  # Job: deploy-azure-api
  # Purpose: To deploy the API application to an Azure Web App.
  # --------------------------------------------------------------------------------------------------
  deploy-azure-api:
    # needs: [build-and-test, security-scan, verify-database-migrations, codeql-analysis]
    # needs: [build-and-test, security-scan, verify-database-migrations]
    needs: apply-prod-migrations
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: publish
        path: ./publish

    - name: Deploy API to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_API_PUBLISH_PROFILE }}
        package: ./publish/api
    
    # - name: Setup .NET
    #   uses: actions/setup-dotnet@v4
    #   with:
    #     dotnet-version: '9.0.x' 
       
    # - name: Install EF Core CLI
    #   run: dotnet tool install --global dotnet-ef

    # - name: Add dotnet tools to PATH
    #   run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # - name: Apply EF Core Migrations to Azure PostgreSQL
    #   if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Staging'
    #   env:
    #     ConnectionStrings__DefaultConnection: ${{ secrets.NEON_POSTGRES_CONNECTION_STRING }}
    #   run: dotnet ef database update --project SmartMenuOptim.API/SmartMenuOptim.API.csproj

  # --------------------------------------------------------------------------------------------------
  # Job: notify-on-failure
  # --------------------------------------------------------------------------------------------------
  notify-on-failure:
    if: failure()
    runs-on: ubuntu-latest
    needs: [deploy-azure-server, deploy-azure-api]
    env:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
    - name: Send email on failure
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ env.SMTP_USERNAME }}
        password: ${{ env.SMTP_PASSWORD }}
        subject: "GitHub Actions CI/CD Pipeline Failed"
        to: softevolutionsl@gmail.com
        from: ${{ secrets.SMTP_USERNAME }}
        body: |
          The CI/CD pipeline for branch '${{ github.ref_name }}' has failed.
          Please check the Actions tab for details.

  # --------------------------------------------------------------------------------------------------
  # Job: notify-on-success
  # --------------------------------------------------------------------------------------------------
  notify-on-success:
    if: success()
    runs-on: ubuntu-latest
    needs: [deploy-azure-server, deploy-azure-api]
    env:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
    - name: Send email on success
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ env.SMTP_USERNAME }}
        password: ${{ env.SMTP_PASSWORD }}
        subject: "GitHub Actions CI/CD Pipeline Succeeded"
        to: softevolutionsl@gmail.com
        from: ${{ env.SMTP_USERNAME }}
        body: |
          The CI/CD pipeline for branch '${{ github.ref_name }}' has completed successfully.
          All checks for build, test, analysis, and deployment passed!
